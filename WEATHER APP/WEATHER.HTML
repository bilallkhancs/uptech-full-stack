<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App - No API Key</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-indigo-600 min-h-screen flex items-center justify-center p-4">

<div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-md text-center transition-transform transform hover:scale-105">
  
  <h1 class="text-4xl font-extrabold mb-6 text-blue-700 drop-shadow-md">🌤 Weather App</h1>

  <input 
    id="cityInput"
    type="text"
    placeholder="Enter city name (e.g., Rawalpindi)"
    class="border-2 border-blue-300 p-3 rounded-xl w-full mb-4 outline-none focus:ring-4 focus:ring-blue-400 focus:border-blue-500 transition"
  />

  <button 
    id="getWeatherBtn"
    class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 active:scale-95 transition font-semibold w-full mb-6"
  >
    Get Weather
  </button>

  <div id="weatherResult" class="mt-6 text-left"></div>
</div>

<script src="script.js"></script>
</body>
</html>

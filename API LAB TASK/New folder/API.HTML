<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Product Inventory</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 via-purple-100 to-pink-100 min-h-screen p-8">

<h1 class="text-4xl font-extrabold text-center mb-8 text-gray-800 drop-shadow">
Product Inventory System
</h1>

<!-- Category Filter -->
<div class="mb-6 flex justify-center">
<select id="categoryFilter"
class="border border-gray-300 p-3 rounded-lg shadow-md bg-white
focus:ring-2 focus:ring-blue-400 focus:outline-none
hover:border-blue-400 transition">

<option value="all">All Categories</option>
<option value="electronics">Electronics</option>
<option value="jewelery">Jewelery</option>
<option value="men's clothing">Men's Clothing</option>
<option value="women's clothing">Women's Clothing</option>

</select>
</div>

<!-- Add Product Form -->

<form id="productForm"
class="bg-white/80 backdrop-blur-md p-6 rounded-xl shadow-xl mb-10 max-w-3xl mx-auto border">

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<input id="title"
placeholder="Title"
class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">

<input id="price"
type="number"
placeholder="Price"
class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">

<input id="category"
placeholder="Category"
class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">

<input id="image"
placeholder="Image URL"
class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">

<textarea id="description"
placeholder="Description"
class="border p-3 rounded-lg col-span-1 md:col-span-2
focus:ring-2 focus:ring-blue-400 focus:outline-none"></textarea>

</div>

<button
class="mt-5 w-full bg-blue-600 text-white py-3 rounded-lg
hover:bg-blue-700 hover:scale-105 transition duration-300
shadow-lg font-semibold">
Add Product
</button>

</form>

<!-- Loading Spinner -->

<div id="loading"
class="text-center text-lg text-blue-600 font-semibold animate-pulse hidden">
Loading products...
</div>

<!-- Empty State -->

<div id="emptyState"
class="text-center text-gray-500 text-lg hidden">
No products found
</div>

<!-- Product Grid -->

<div id="productGrid"
class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

<!-- Example Card (Your JS will generate these) -->

<div class="bg-white rounded-xl shadow-lg p-4 hover:shadow-2xl hover:-translate-y-2 transition duration-300">

<img src="https://via.placeholder.com/200"
class="h-40 w-full object-contain mb-3">

<h2 class="font-bold text-lg text-gray-800">Product Title</h2>

<p class="text-gray-500 text-sm mt-1">
Short description of the product
</p>

<p class="text-blue-600 font-bold mt-2">$99</p>

<button
class="mt-3 w-full bg-red-500 text-white py-2 rounded-lg
hover:bg-red-600 transition">
Delete
</button>

</div>

</div>

<script src="API.JS"></script>

</body>
</html>

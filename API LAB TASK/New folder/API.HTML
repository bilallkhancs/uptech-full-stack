<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 via-purple-100 to-pink-100 min-h-screen p-4 md:p-8">

  <h1 class="text-2xl md:text-4xl font-extrabold text-center mb-6 md:mb-8 text-gray-800 drop-shadow">
    Product Inventory System
  </h1>

  <!-- Category Filter -->
  <div class="mb-5 flex justify-between items-center">
    <select id="categoryFilter"
      class="w-full md:w-auto border border-gray-300 p-3 rounded-lg shadow-md bg-white
             focus:ring-2 focus:ring-blue-400 focus:outline-none
             hover:border-blue-400 transition text-sm md:text-base">
      <option value="all">All Categories</option>
      <option value="electronics">Electronics</option>
      <option value="jewelery">Jewelery</option>
      <option value="men's clothing">Men's Clothing</option>
      <option value="women's clothing">Women's Clothing</option>
    </select>
  </div>

  <!-- Add Product Form -->
  <div id="productForm"
    class="bg-white/80 backdrop-blur-md p-4 md:p-6 rounded-xl shadow-xl mb-8 md:mb-10 w-full max-w-3xl mx-auto border">

    <h2 class="text-lg font-bold text-gray-700 mb-4">Add New Product</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">

      <input id="title"
        placeholder="Title"
        class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm w-full">

      <input id="price"
        type="number"
        placeholder="Price"
        class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm w-full">

      <input id="category"
        placeholder="Category"
        class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm w-full">

      <input id="image"
        placeholder="Image URL"
        class="border p-3 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm w-full">

      <textarea id="description"
        placeholder="Description"
        rows="3"
        class="border p-3 rounded-lg col-span-1 md:col-span-2
               focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm w-full resize-none"></textarea>

    </div>

    <button onclick="addProduct()"
      class="mt-4 md:mt-5 w-full bg-blue-600 text-white py-3 rounded-lg
             hover:bg-blue-700 active:scale-95 transition duration-300
             shadow-lg font-semibold text-sm md:text-base">
      Add Product
    </button>

  </div>

  <!-- Loading Spinner -->
  <div id="loading"
    class="text-center text-base md:text-lg text-blue-600 font-semibold animate-pulse hidden">
    Loading products...
  </div>

  <!-- Empty State -->
  <div id="emptyState"
    class="text-center text-gray-500 text-base md:text-lg hidden">
    No products found
  </div>

  <!-- Product Grid -->
  <div id="productGrid"
    class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6">

    <!-- Example Card -->
    <div class="bg-white rounded-xl shadow-lg p-3 md:p-4 hover:shadow-2xl hover:-translate-y-1 md:hover:-translate-y-2 transition duration-300">

      <img src="https://via.placeholder.com/200"
        class="h-32 md:h-40 w-full object-contain mb-2 md:mb-3">

      <h2 class="font-bold text-sm md:text-lg text-gray-800 leading-tight">Product Title</h2>

      <p class="text-gray-500 text-xs md:text-sm mt-1 line-clamp-2">
        Short description of the product
      </p>

      <p class="text-blue-600 font-bold mt-2 text-sm md:text-base">$99</p>

      <button
        class="mt-2 md:mt-3 w-full bg-red-500 text-white py-2 rounded-lg
               hover:bg-red-600 active:scale-95 transition text-sm">
        Delete
      </button>

    </div>

  </div>

  <script src="API.JS"></script>

</body>
</html>

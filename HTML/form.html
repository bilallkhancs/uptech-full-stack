<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background: white;
            padding: 25px 35px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
        }

        td {
            padding: 10px;
        }

       input[type="phone" ],
        select {
            width: 20%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            
        }
         input[type="text"],
        input[type="password"],
        input[type="email"],        
        .phone {
            width: 70%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            
        }

        input[type="radio"] {
            margin-right: 5px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #00c6ff;
        }
    </style>
</head>
<body>
    <form>
        <table>
            <tr>
                <td>Name:</td>
                <td><input type="text" placeholder="Name" name=""> </td>
            </tr>
            <tr>
                <td>
                    Password:
                </td>
                <td><input type="password" placeholder="Password" name=""</td>
            </tr>
            <tr>
                <td>
                    Email:
                </td>
                <td><input type="text" placeholder="abc@mail.com" name=""</td>
            </tr>            
            <tr>
                <td>Gender:</td>
                <td><input type="radio" name="Gender">MALE
                <input type="radio" name="Gender">FEMALE </td>
            </tr>
            <tr class="phone">
            
                <td>Phone Number:</td>
                <td ><select>
                    <option>0300</option>
                    <option>0301</option>
                    <option>0302</option>
                    <option>0303</option>
                    <option>0304</option>
                    <option>0305</option>
                    <option>0306</option>
                    <option>0307</option>
                    <option>0308</option>
                    <option>0309</option>

                </select> <input type="Phone" placeholer="123456789" name=""> </td>
            </tr>
            <tr>
                <td>
                    <input type="Submit" value="Submit"
                </td>
            </tr>
        </table>
    </form>
</body>
</html>

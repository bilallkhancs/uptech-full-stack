<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Project</h1>
<h2>To-Do List</h2>

<input id="task" placeholder="New task">

<button onclick="addTask()">Add</button>

<ol id="list"></ol>

<button onclick="clearAll()">Clear All</button>

<script>
// Create a global task Array
let tasks = [];

// Function to Display tasks
function displayTasks() {
  let html = "";
  for (let i = 0; i < tasks.length; i++) { 
    html += "<li>" + tasks[i] + " <button onclick='removeTask(" + i + ")'>x</button>" + " <button onclick='editTask(" + i + ")'>Edit</button></li>"; }
  document.getElementById("list").innerHTML = html;
}

// Function to Add a task
function addTask() {
  let taskInput = document.getElementById("task");
  let text = taskInput.value;
  if (text === "") {
    return;
  }
  tasks.push(text);
  taskInput.value = "";
  saveTasks();
  displayTasks();
}

// Function to Remove a task
function removeTask(i) {
  tasks.splice(i, 1);
  saveTasks();
  displayTasks();
}

// Function to Clear all tasks
function clearAll() {
  tasks = [];
  saveTasks();
  displayTasks();
}

// Function to Edit a task 
function editTask(i) { 
    let newText = prompt("Update your task:", tasks[i]); 
    if (newText !== null && newText.trim() !== "") { 
        tasks[i] = newText; saveTasks(); displayTasks(); 
    } 
}

// Function to Save tasks
function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

// Function to Load tasks
function loadTasks() {
  let saved = localStorage.getItem("tasks");
  if (saved !== null) {
    tasks = JSON.parse(saved);
  }
}

// Load and display tasks when page loads 
loadTasks();
displayTasks();
</script>

</body>
</html>
